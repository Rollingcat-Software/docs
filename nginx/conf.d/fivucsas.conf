# FIVUCSAS API Gateway Configuration

upstream identity_core_api {
    server identity-core-api:8080 max_fails=3 fail_timeout=30s;
}

upstream biometric_processor {
    server biometric-processor:8001 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # CORS headers (adjust origins for production)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-ID" always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Identity Core API - Authentication endpoints (rate limited)
    location ~ ^/api/v1/auth/(login|register) {
        limit_req zone=auth_limit burst=2 nodelay;

        proxy_pass http://identity_core_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Identity Core API - General endpoints
    location /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://identity_core_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Biometric Processor API
    location /biometric/v1/ {
        limit_req zone=api_limit burst=10 nodelay;

        # Rewrite to remove /biometric prefix
        rewrite ^/biometric/v1/(.*) /api/v1/$1 break;

        proxy_pass http://biometric_processor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeouts for biometric processing
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Larger body size for image uploads
        client_max_body_size 10M;
    }

    # Actuator endpoints (restricted in production)
    location /actuator/ {
        # Allow only from internal network in production
        # allow 10.0.0.0/8;
        # deny all;

        proxy_pass http://identity_core_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Swagger UI (disable in production)
    location /swagger-ui/ {
        proxy_pass http://identity_core_api;
        proxy_set_header Host $host;
    }

    location /v3/api-docs/ {
        proxy_pass http://identity_core_api;
        proxy_set_header Host $host;
    }

    # Default error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
